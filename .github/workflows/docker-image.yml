name: Docker CI with Cortex Security

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CORTEX_URL: https://api-xsiamnfrsentria.xdr.us.paloaltonetworks.com
  API_ID: ${{ secrets.CORTEX_API_KEY_ID }}
  API_KEY: ${{ secrets.CORTEX_API_KEY }}
  IMAGE_NAME: "voting-app-vote:latest"

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- 1. INSTALAR DEPENDENCIAS ---
      - name: Download Cortex dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhyperscan5 jq

      # --- 2. INSTALAR CORTEX CLI ---
      - name: Cortex CLI install
        run: |
          crtx_resp=$(curl -s "$CORTEX_URL/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: $API_ID" \
            -H "Authorization: $API_KEY") 
            
          if [ $? -ne 0 ] || echo "$crtx_resp" | jq -e '.error_code' > /dev/null; then
            echo "Failed to retrieve CLI download link. Response: $crtx_resp"
            exit 1
          fi

          crtx_url=$(echo $crtx_resp | jq -r ".signed_url")
          # Forzamos el nombre a 'cortexcli' para facilitar los siguientes pasos
          curl -sL -o cortexcli "$crtx_url"
          chmod +x cortexcli

      # --- 3. CODE SCAN (Antes del Build) ---
      - name: Cortex Code Scan
        run: |
          ./cortexcli \
            --api-base-url "$CORTEX_URL" \
            --api-key "$API_KEY" \
            --api-key-id "$API_ID" \
            code scan \
            --directory "${{ github.workspace }}" \
            --repo-id "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --source "GITHUB_ACTIONS" \
            --create-repo-if-missing

      # --- 4. BUILD DE LA IMAGEN ---
      - name: Build Docker image
        run: |
          # Construimos usando la subcarpeta /vote que vimos en tu captura
          docker build -t $IMAGE_NAME ./vote

      # --- 5. IMAGE SCAN (Con SUDO y dependencias listas) ---
      - name: Cortex Image Scan
        run: |
          sudo ./cortexcli \
            --api-base-url "$CORTEX_URL" \
            --api-key "$API_KEY" \
            --api-key-id "$API_ID" \
            image scan $IMAGE_NAME
