name: Docker CI with Cortex Binary Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
  CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
  CORTEX_API_URL: https://api-xsiamnfrsentria.xdr.us.paloaltonetworks.com

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- ETAPA 1: CORTEX CLI SCAN ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download cortexcli
        run: |
          set -e
          crtx_resp=$(curl -s "${CORTEX_API_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" \
            -H "Authorization: ${CORTEX_API_KEY}")
          
          crtx_url=$(echo $crtx_resp | jq -r ".signed_url")
          
          if [ "$crtx_url" == "null" ]; then
            echo "Error: No se pudo obtener la URL de descarga. Revisa tus credenciales."
            exit 1
          fi
          
          curl -sL -o cortexcli "$crtx_url"
          chmod +x cortexcli
          ./cortexcli --version

      - name: Run Cortex CLI Code Scan
        run: |
          ./cortexcli \
            --api-base-url "${CORTEX_API_URL}" \
            --api-key "${CORTEX_API_KEY}" \
            --api-key-id "${CORTEX_API_KEY_ID}" \
            code scan \
            --directory "${{ github.workspace }}" \
            --repo-id "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --source "GITHUB_ACTIONS" \
            --create-repo-if-missing

      # --- ETAPA 2: DOCKER BUILD ---
      - name: Build the Docker image
        run: |
          docker build \
            -t voting-app-vote:$(date +%s) \
            ./vote
