name: Docker CI with Cortex Security

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Variables globales
  CORTEX_URL: https://api-xsiamnfrsentria.xdr.us.paloaltonetworks.com
  API_ID: ${{ secrets.CORTEX_API_KEY_ID }}
  API_KEY: ${{ secrets.CORTEX_API_KEY }}
  IMAGE_NAME: "voting-app-vote:latest"

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- 1. INSTALAR DEPENDENCIAS SISTEMA ---
      - name: Download Cortex dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhyperscan5 jq
          
      - name: Instalar Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # --- 2. INSTALAR CORTEX CLI (Lógica idéntica a Azure) ---
      - name: Cortex CLI install
        run: |
          set -euo pipefail  # Detener el script si hay errores o variables vacías
          
          echo "Consultando link de descarga..."
          crtx_resp=$(curl -s -S "${CORTEX_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: ${API_ID}" \
            -H "Authorization: ${API_KEY}")
          
          # Extraer URL y validar con JQ en un solo paso
          crtx_url=$(echo "$crtx_resp" | jq -e -r '.signed_url // empty')

          if [ -z "$crtx_url" ] || [ "$crtx_url" = "null" ]; then
            echo "::error::No se pudo obtener el signed_url de Cortex. Respuesta: $crtx_resp"
            exit 1
          fi

          echo "Descargando e instalando binario..."
          # -L para seguir redirecciones, -s para modo silencioso
          curl -sL -o cortexcli "$crtx_url"
          chmod +x cortexcli
          
          # Mover a la ruta global para evitar problemas de ./ en pasos futuros
          sudo mv cortexcli /usr/local/bin/cortexcli
          
          echo "Instalación completada:"
          cortexcli --version

      # --- 3. CODE SCAN (Antes del Build) ---
      #- name: Cortex Code Scan
    #    run: |
     #     ./$CRTX_FILENAME \
      #      --api-base-url "$CORTEX_URL" \
       #     --api-key "$API_KEY" \
        #    --api-key-id "$API_ID" \
         #   code scan \
          #  --directory "${{ github.workspace }}" \
           # --repo-id "${{ github.repository }}" \
           # --branch "${{ github.ref_name }}" \
           # --source "GITHUB_ACTIONS" \
           # --create-repo-if-missing

      # --- 4. BUILD DE LA IMAGEN ---
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME ./vote

      # --- 5. IMAGE SCAN (Lógica idéntica a Azure) ---
      - name: Cortex Image Scan
        run: |
          set -euo pipefail
          docker images
          echo "Scanning image: $IMAGE_NAME"
          cortexcli \
            --api-base-url "$CORTEX_URL" \
            --api-key "$API_KEY" \
            --api-key-id "$API_ID" \
            image scan $IMAGE_NAME
