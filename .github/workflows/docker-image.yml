name: Docker CI with Cortex Full Security

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
  CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
  CORTEX_API_URL: https://api-xsiamnfrsentria.xdr.us.paloaltonetworks.com
  IMAGE_NAME: voting-app-vote

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- ETAPA 1: SETUP Y DOWNLOAD CLI ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download cortexcli
        run: |
          crtx_resp=$(curl -s "${CORTEX_API_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" \
            -H "Authorization: ${CORTEX_API_KEY}")
          crtx_url=$(echo $crtx_resp | jq -r ".signed_url")
          curl -sL -o cortexcli "$crtx_url"
          chmod +x cortexcli

      # --- ETAPA 2: CODE SCAN (Fuentes) ---
      - name: Run Cortex Code Scan
        run: |
          ./cortexcli \
            --api-base-url "${CORTEX_API_URL}" \
            --api-key "${CORTEX_API_KEY}" \
            --api-key-id "${CORTEX_API_KEY_ID}" \
            code scan \
            --directory "${{ github.workspace }}" \
            --repo-id "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --source "GITHUB_ACTIONS" \
            --create-repo-if-missing

      # --- ETAPA 3: DOCKER BUILD (Local) ---
      - name: Build Docker Image
        run: |
          # Usamos un tag fijo para el escaneo interno
          docker build -t ${{ env.IMAGE_NAME }}:local ./vote

      # --- ETAPA 4: IMAGE SCAN (Contenedor) ---
      - name: Run Cortex Image Scan
        run: |
          ./cortexcli \
            --api-base-url "${CORTEX_API_URL}" \
            --api-key "${CORTEX_API_KEY}" \
            --api-key-id "${CORTEX_API_KEY_ID}" \
            image scan \
            ${{ env.IMAGE_NAME }}:local
